name: Daily TW Stock Picks

on:
  schedule:
    # UTC 10:00 = Taipei 18:00, weekdays only
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily strategy
        env:
          FINMIND_USER: ${{ secrets.FINMIND_USER }}
          FINMIND_PASSWORD: ${{ secrets.FINMIND_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          TZ: Asia/Taipei
        run: python run_daily.py

      - name: Commit and push HTML to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update: daily picks $(date +%Y-%m-%d)"
          git push
